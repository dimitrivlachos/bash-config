# ==============================================================================
# TMUX CONFIGURATION
# ==============================================================================
# ~/.config/tmux is symlinked to $BASH_CONFIG_DIR/configs/tmux/ by the
# bash-config installer, so paths below resolve correctly on any machine where
# install.sh has been run.
# ==============================================================================

# ------------------------------------------------------------------------------
# General
# ------------------------------------------------------------------------------
set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"   # enable true-colour pass-through
set -g history-limit 10000
set -g base-index 1           # windows start at 1, not 0
set -g pane-base-index 1      # panes start at 1, not 0
set -g renumber-windows on    # close gap when a window is closed

# ------------------------------------------------------------------------------
# Catppuccin — Mocha flavour
# ------------------------------------------------------------------------------
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# ------------------------------------------------------------------------------
# Status line
# ------------------------------------------------------------------------------
set -g status-position top
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

# ------------------------------------------------------------------------------
# Key bindings
# ------------------------------------------------------------------------------
# Use Ctrl-a as prefix (screen-style), keep Ctrl-b as well
set -g prefix2 C-a
bind C-a send-prefix -2

# Intuitive split bindings (preserve current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"
