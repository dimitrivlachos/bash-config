# ==============================================================================
# TMUX CONFIGURATION
# ==============================================================================
# ~/.config/tmux is symlinked to $BASH_CONFIG_DIR/configs/tmux/ by the
# bash-config installer, so paths below resolve correctly on any machine where
# install.sh has been run.
# ==============================================================================

# ------------------------------------------------------------------------------
# General
# ------------------------------------------------------------------------------
set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"   # enable true-colour pass-through
set -g history-limit 10000
set -g base-index 1           # windows start at 1, not 0
set -g pane-base-index 1      # panes start at 1, not 0
set -g renumber-windows on    # close gap when a window is closed

# ------------------------------------------------------------------------------
# Catppuccin — Mocha flavour
# ------------------------------------------------------------------------------
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# catppuccin uses #{l:...} (tmux literal modifier, tmux 3.2+) for plugin-provided
# format strings — this prevents expansion, so we bypass it by pre-setting the
# option variables with direct #(...) shell calls before catppuccin loads.
# catppuccin uses -ogq (don't overwrite), so our pre-set values are preserved.
#
# text_bg is set to "" so status_module.conf's %if falls through to the default
# module text background instead of the invalid #{l:#{cpu_bg_color}} literal,
# which was painting the entire pill yellow.
set -g @catppuccin_cpu_text " #(~/.config/tmux/plugins/tmux-plugins/tmux-cpu/scripts/cpu_percentage.sh)"
set -g @catppuccin_status_cpu_text_bg "#{@thm_surface_0}"
set -g @catppuccin_ram_text " #(~/.config/tmux/plugins/tmux-plugins/tmux-cpu/scripts/ram_percentage.sh)"
set -g @catppuccin_status_ram_text_bg "#{@thm_surface_0}"
set -g @catppuccin_battery_icon "#(~/.config/tmux/plugins/tmux-plugins/tmux-battery/scripts/battery_icon_status.sh)"
set -g @catppuccin_battery_text " #(~/.config/tmux/plugins/tmux-plugins/tmux-battery/scripts/battery_percentage.sh)"
set -g @catppuccin_load_text "#(cut -d' ' -f1-3 /proc/loadavg)"
set -g @catppuccin_date_time_text " %H:%M"

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# ------------------------------------------------------------------------------
# Status line
# ------------------------------------------------------------------------------

set -g status-position bottom
set -g status-left-length 100
set -g status-right-length 200

# Left: session name
set -g status-left "#{E:@catppuccin_status_session}"

# Right: cpu | ram | load | battery | time
set -g status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#{E:@catppuccin_status_load}"
set -ag status-right "#{E:@catppuccin_status_battery}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# ------------------------------------------------------------------------------
# Key bindings
# ------------------------------------------------------------------------------
# Use Ctrl-a as prefix (screen-style), keep Ctrl-b as well
set -g prefix2 C-a
bind C-a send-prefix -2

# Intuitive split bindings (preserve current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"
